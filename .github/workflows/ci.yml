name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal test)"
      - name: Vet (all build tags)
        run: just vet
      - name: Unit tests
        run: go test -race ./internal/...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Integration tests (envtest)
        run: just test-integration

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: sts-reconciler-e2e
          node_image: kindest/node:v1.33.1
          config: hack/kind-config.yaml
      - name: E2E tests (in-process manager)
        run: just test-e2e

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint chart and render both recreate modes
        run: |
          # --kube-version: offline rendering defaults to v1.20, below the
          # chart's kubeVersion floor; match what the e2e cluster runs.
          tpl="helm template ksr charts/kube-sts-reconciler --kube-version 1.33.0"
          helm lint charts/kube-sts-reconciler
          $tpl > /dev/null
          $tpl --set controller.recreateMode=self > /dev/null
          $tpl --set controller.dryRun=true --set controller.leaderElection=false > /dev/null
          $tpl --set replicaCount=2 > /dev/null
          # Multiple replicas without leader election must refuse to render.
          if $tpl --set replicaCount=2 --set controller.leaderElection=false > /dev/null 2>&1; then
            echo "expected render to fail: replicaCount>1 without leader election" >&2
            exit 1
          fi

  e2e-deployed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: sts-reconciler-e2e
          node_image: kindest/node:v1.33.1
          config: hack/kind-config.yaml
      - name: Build image, helm-install, run e2e against the deployed controller
        run: just deploy-kind test-e2e-deployed

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required by the buildx GHA layer-cache backend (cache-from/cache-to
      # type=gha); without it, cache writes fail and every build runs cold.
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Determine push eligibility
        id: push
        run: |
          # Fork PRs get a read-only GITHUB_TOKEN; skip push to avoid 403.
          if [ "${{ github.event_name }}" = "push" ] || \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/login-action@v3
        if: steps.push.outputs.enabled == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ steps.push.outputs.enabled }}
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('ghcr.io/{0}:main', github.repository) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
