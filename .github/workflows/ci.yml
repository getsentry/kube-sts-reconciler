name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal test)"
      - name: Vet (all build tags)
        run: just vet
      - name: Unit tests
        run: go test -race ./internal/...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Integration tests (envtest)
        run: just test-integration

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: sts-reconciler-e2e
          node_image: kindest/node:v1.33.1
          config: hack/kind-config.yaml
      - name: E2E tests (in-process manager)
        run: just test-e2e

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint chart and render both recreate modes
        run: |
          helm lint charts/kube-sts-reconciler
          helm template ksr charts/kube-sts-reconciler > /dev/null
          helm template ksr charts/kube-sts-reconciler --set controller.recreateMode=self > /dev/null
          helm template ksr charts/kube-sts-reconciler --set controller.dryRun=true --set controller.leaderElection=false > /dev/null
          helm template ksr charts/kube-sts-reconciler --set replicaCount=2 > /dev/null
          # Multiple replicas without leader election must refuse to render.
          if helm template ksr charts/kube-sts-reconciler --set replicaCount=2 --set controller.leaderElection=false > /dev/null 2>&1; then
            echo "expected render to fail: replicaCount>1 without leader election" >&2
            exit 1
          fi

  e2e-deployed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: sts-reconciler-e2e
          node_image: kindest/node:v1.33.1
          config: hack/kind-config.yaml
      - name: Build image, helm-install, run e2e against the deployed controller
        run: just deploy-kind test-e2e-deployed

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required by the buildx GHA layer-cache backend (cache-from/cache-to
      # type=gha); without it, cache writes fail and every build runs cold.
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
