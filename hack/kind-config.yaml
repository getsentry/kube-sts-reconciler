# kind cluster for the e2e harness (make kind-up).
#
# VolumeAttributesClass is beta (off by default) through Kubernetes 1.33, and
# its API lives in storage.k8s.io/v1beta1 — both must be switched on for the
# reconciler's VAC path to work.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
featureGates:
  VolumeAttributesClass: true
runtimeConfig:
  "storage.k8s.io/v1beta1": "true"
nodes:
  - role: control-plane
