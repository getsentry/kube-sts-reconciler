{{- if and (gt (int .Values.replicaCount) 1) (not .Values.controller.leaderElection) }}
{{- fail "replicaCount > 1 requires controller.leaderElection=true: multiple replicas without leader election reconcile the same StatefulSets concurrently" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ksr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksr.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ksr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ksr.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ksr.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --label-selector={{ .Values.controller.labelSelector }}
            - --recreate-mode={{ .Values.controller.recreateMode }}
            - --convergence-timeout={{ .Values.controller.convergenceTimeout }}
            - --gate-timeout={{ .Values.controller.gateTimeout }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:{{ .Values.healthProbePort }}
            {{- if .Values.controller.leaderElection }}
            - --leader-elect
            {{- end }}
            {{- if .Values.controller.dryRun }}
            - --dry-run
            {{- end }}
            {{- range .Values.controller.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
            - name: health
              containerPort: {{ .Values.healthProbePort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
